<!DOCTYPE html>
<html lang="hi" data-theme="military">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation Baaz — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="p-4 bg-[var(--bg)] text-[var(--text)]">

    <header class="text-center mb-8">
        <h1 class="text-4xl font-black brand-gradient">OPERATION BAAZ</h1>
    </header>

    <div class="max-w-4xl mx-auto">
        <div class="premium-card p-4 flex justify-between items-center mb-6">
            <div>
                <p class="text-xs text-muted font-bold">JAI HIND,</p>
                <h2 class="text-lg font-black text-accent" id="student-name">Soldier</h2>
            </div>
            <button onclick="logout()" class="btn-danger-outline px-3 py-1 rounded-xl text-xs font-bold">Logout</button>
        </div>

        <div class="home-grid">
            <a href="exam.html" class="home-card card-g1"><i class="fas fa-file-alt text-2xl"></i><span class="font-bold text-xs">Mock Test</span></a>
            <a href="notes.html" class="home-card card-g2"><i class="fas fa-book-open text-2xl"></i><span class="font-bold text-xs">Notes</span></a>
            <a href="ssb.html" class="home-card card-g4"><i class="fas fa-chess-knight text-2xl"></i><span class="font-bold text-xs">SSB Prep</span></a>
            <a href="medical.html" class="home-card card-g5"><i class="fas fa-stethoscope text-2xl"></i><span class="font-bold text-xs">Medical</span></a>
            <a href="profile.html" class="home-card card-g3"><i class="fas fa-user text-2xl"></i><span class="font-bold text-xs">Profile</span></a>
            <a href="courses.html" class="home-card card-g6"><i class="fas fa-crown text-2xl"></i><span class="font-bold text-xs">Paid Classes</span></a>
            <a href="ranking.html" class="home-card card-g7"><i class="fas fa-trophy text-2xl"></i><span class="font-bold text-xs">Ranking</span></a>
            <a href="admin.html" class="home-card bg-red-900 border-red-500"><i class="fas fa-user-shield text-2xl"></i><span class="font-bold text-xs">Admin Panel</span></a>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Set Name
        document.getElementById('student-name').innerText = currentUserData.name;
    </script>
</body>
</html>
