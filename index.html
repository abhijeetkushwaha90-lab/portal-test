<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Operation Baaz | Military Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="p-6">

    <div id="auth-box" class="max-w-md mx-auto mt-20">
        <h1 class="text-4xl font-black text-center brand-gradient mb-8">OPERATION BAAZ</h1>
        <div class="premium-card p-8">
            <input id="email" type="email" placeholder="Email Address" class="input-field">
            <input id="pass" type="password" placeholder="Password" class="input-field">
            <button onclick="login()" class="btn-accent">AUTHENTICATE</button>
        </div>
    </div>

    <div id="dash-box" class="hidden max-w-5xl mx-auto">
        <div class="premium-card p-6 flex justify-between items-center mb-10">
            <div>
                <p class="text-xs text-gray-400">JAI HIND,</p>
                <h2 class="text-2xl font-black" id="user-name">Soldier</h2>
            </div>
            <button onclick="logout()" class="btn-danger-outline">Logout</button>
        </div>

        <div class="home-grid">
            <a href="exam.html" class="home-card"><i class="fas fa-file-alt text-4xl"></i><span>Mock Test</span></a>
            <a href="notes.html" class="home-card"><i class="fas fa-book text-4xl"></i><span>Notes</span></a>
            <a href="ssb.html" class="home-card"><i class="fas fa-chess-knight text-4xl"></i><span>SSB Prep</span></a>
            <a href="medical.html" class="home-card"><i class="fas fa-stethoscope text-4xl"></i><span>Medical</span></a>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Check Login
        if(localStorage.getItem('baaz_userdata')) {
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('dash-box').classList.remove('hidden');
            document.getElementById('user-name').innerText = JSON.parse(localStorage.getItem('baaz_userdata')).name;
        }
    </script>
</body>
</html>
